<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bringgas PDI - Join Class</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "surface-container-highest": "#e1e3e4",
                      "on-tertiary-container": "#fffbff",
                      "surface-tint": "#006c4a",

                      "sidebar-width": "280px",

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9FAFB; /* Level 0 Canvas */
            color: #191c1d;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-background text-on-background relative overflow-hidden">
<!-- Top Navigation Bar for Desktop & Mobile -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center h-16 px-lg bg-surface border-b border-outline-variant md:px-lg md:px-xl">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="school">school</span>
<span class="font-headline-md-mobile text-headline-md-mobile md:font-headline-md md:text-headline-md font-bold text-primary tracking-tight">Bringgas PDI</span>
</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:text-primary transition-all duration-200">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-all duration-200 hidden md:block">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="w-full max-w-md px-md md:px-0 flex-grow flex items-center justify-center mt-16 z-10 relative">
<!-- Background Pattern / Decoration -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center -z-10 opacity-20">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="200" cy="200" r="199" stroke="#bccac0" stroke-dasharray="10 10" stroke-width="2"></circle>
<circle cx="200" cy="200" r="150" stroke="#bccac0" stroke-dasharray="5 5" stroke-width="1"></circle>
<circle cx="200" cy="200" r="100" stroke="#bccac0" stroke-dasharray="2 4" stroke-width="1"></circle>
</svg>
</div>
<div class="w-full bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-lg md:p-xl flex flex-col gap-lg">
<div class="text-center flex flex-col gap-xs">
<div class="mx-auto w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-primary" data-icon="login" data-weight="fill" style="font-variation-settings: 'FILL' 1;">login</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">Join a Live Session</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter the code provided by your instructor to join the class.</p>
</div>
<form class="flex flex-col gap-md" onsubmit="event.preventDefault(); window.location.href='#';">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="classCode">Class Code</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded focus:border-secondary focus:ring-2 focus:ring-secondary/20 font-body-lg text-body-lg text-center tracking-widest uppercase transition-all duration-200 outline-none placeholder:text-surface-variant" id="classCode" maxlength="6" name="classCode" placeholder="000000" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="studentName">Name / NRP</label>
<div class="relative">
<span class="absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</span>
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded pl-[40px] pr-sm focus:border-secondary focus:ring-2 focus:ring-secondary/20 font-body-md text-body-md transition-all duration-200 outline-none placeholder:text-surface-variant" id="studentName" name="studentName" placeholder="Enter your full name or ID" type="text"/>
</div>
</div>
<button class="w-full h-12 mt-sm bg-[#059669] hover:bg-[#047857] text-white rounded font-label-md text-label-md transition-all duration-200 flex items-center justify-center gap-xs shadow-sm hover:shadow-md active:scale-95" type="submit">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
                    Join Classroom
                </button>
</form>
<div class="text-center mt-xs">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Having trouble?</p>
<a class="font-label-md text-label-md text-secondary hover:text-on-secondary-fixed-variant hover:underline transition-colors mt-xs inline-block" href="#">Contact Administrator</a>
</div>
</div>
</main>
<!-- Contextual FAB - Suppressed on transactional page as per rules -->
<script>
        // Simple input validation formatting
        const codeInput = document.getElementById('classCode');
        codeInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            e.target.value = value;
        });
    </script>
</body></html>
