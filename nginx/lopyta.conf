# Upstream Cluster Definition for Load Balancing
upstream lopyta_backend {
    # Pin client IP to a single backend node for session affinity
    ip_hash;
    
    server 127.0.0.1:8789; # Node 1 Web Server
    server 127.0.0.1:8790; # Node 2 Web Server
}

# ============================================================
# 1. HTTP → HTTPS Redirect (All Lopyta subdomains)
# ============================================================
server {
    listen 80;
    server_name guru.lopyta.com siswa.lopyta.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ============================================================
# 2. HTTPS - Teacher Endpoint (guru.lopyta.com)
# ============================================================
server {
    listen 443 ssl;
    server_name guru.lopyta.com;

    # SSL Certificate Paths (auto-managed by Certbot / mkcert for local dev)
    ssl_certificate /etc/ssl/lopyta/lopyta.crt;
    ssl_certificate_key /etc/ssl/lopyta/lopyta.key;

    ssl_session_cache shared:LopytaSSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/lopyta_guru_access.log;
    error_log /var/log/nginx/lopyta_guru_error.log;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow large presentation file uploads
    client_max_body_size 50M;



    # Proxy root path to Fiber backend
    location / {
        proxy_pass http://lopyta_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket Traffic with Upgrades (Custom Binary Protocol)
    location /ws {
        proxy_pass http://lopyta_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering and extend timeouts for long-lived sockets
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ============================================================
# 3. HTTPS - Student Endpoint (siswa.lopyta.com)
# ============================================================
server {
    listen 443 ssl;
    server_name siswa.lopyta.com;

    # SSL Certificate Paths (same cert if using multi-domain/SAN)
    ssl_certificate /etc/ssl/lopyta/lopyta.crt;
    ssl_certificate_key /etc/ssl/lopyta/lopyta.key;

    ssl_session_cache shared:LopytaSSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/lopyta_siswa_access.log;
    error_log /var/log/nginx/lopyta_siswa_error.log;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Explicitly block access to the teacher panel on the student domain
    location = /host {
        return 403 "Akses Ditolak: Anda tidak diizinkan mengakses panel Guru.";
    }

    # Proxy root path to Fiber backend
    location / {
        proxy_pass http://lopyta_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket Traffic with Upgrades (Custom Binary Protocol)
    location /ws {
        proxy_pass http://lopyta_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering and extend timeouts for long-lived sockets
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}