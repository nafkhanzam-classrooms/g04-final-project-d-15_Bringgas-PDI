# Upstream Cluster Definition for Load Balancing
upstream lopyta_backend {
    # Distribute traffic based on active connection counts
    least_conn;
    
    server 127.0.0.1:8789; # Node 1 Web Server
    server 127.0.0.1:8790; # Node 2 Web Server
}

# 1. Configuration for Teacher Endpoint (guru.lopyta.org)
server {
    listen 80;
    server_name guru.lopyta.org;

    access_log /var/log/nginx/lopyta_guru_access.log;
    error_log /var/log/nginx/lopyta_guru_error.log;

    # Explicitly block access to the student join page on the teacher domain
    location = /index.html {
        return 403 "Akses Ditolak: Halaman Siswa tidak diizinkan di subdomain Guru.";
    }

    # Proxy root path to Fiber backend
    location / {
        proxy_pass http://lopyta_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket Traffic with Upgrades (Custom Binary Protocol)
    location /ws {
        proxy_pass http://lopyta_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering and extend timeouts for long-lived sockets
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# 2. Configuration for Student Endpoint (siswa.lopyta.org)
server {
    listen 80;
    server_name siswa.lopyta.org;

    access_log /var/log/nginx/lopyta_siswa_access.log;
    error_log /var/log/nginx/lopyta_siswa_error.log;

    # Explicitly block access to the teacher panel on the student domain (Gateway Level Security)
    location = /host.html {
        return 403 "Akses Ditolak: Anda tidak diizinkan mengakses panel Guru.";
    }

    # Proxy root path to Fiber backend
    location / {
        proxy_pass http://lopyta_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket Traffic with Upgrades (Custom Binary Protocol)
    location /ws {
        proxy_pass http://lopyta_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering and extend timeouts for long-lived sockets
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
