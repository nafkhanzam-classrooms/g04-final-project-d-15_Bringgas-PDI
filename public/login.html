<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lopyta Interactive Class — Login Guru</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .login-container {
      max-width: 440px;
      margin: 100px auto;
      width: 100%;
      text-align: center;
    }
    .auth-options {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 32px;
    }
    .btn-google {
      background: #fff;
      color: #0b0e14;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 4px 15px rgba(255,255,255,0.05);
      font-size: 1.05rem;
      gap: 12px;
    }
    .btn-google:hover {
      background: #f1f1f1;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255,255,255,0.1);
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-glow);
    }
    .divider:not(:empty)::before {
      margin-right: .5em;
    }
    .divider:not(:empty)::after {
      margin-left: .5em;
    }
    .mock-panel {
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed var(--border-glow);
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
      transition: var(--transition-smooth);
    }
    .mock-panel:hover {
      border-color: var(--secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span>🎓</span> Lopyta Guru Dashboard
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span>Teacher Portal</span>
      </div>
    </header>

    <!-- Login Card -->
    <div class="glass-card login-container">
      <h2 class="join-title" style="background: linear-gradient(to right, #fff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Panel Masuk Guru</h2>
      <p class="join-subtitle">Mulai ruang belajar interaktif dan kelola Bank Soal Anda secara permanen.</p>
      
      <div class="auth-options">
        <!-- Main Google OAuth Button -->
        <a href="/api/auth/google/login" class="btn btn-google">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block;">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Masuk dengan Google
        </a>

        <div class="divider">atau Developer bypass</div>

        <!-- Offline Mock Authentication for local development -->
        <div class="mock-panel">
          <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; text-align: left;">🔧 <strong>Developer Bypass:</strong> Gunakan email apa saja untuk login secara instan tanpa OAuth.</p>
          <div class="input-group" style="margin-bottom: 12px;">
            <input type="email" id="mockEmail" class="input-field" placeholder="contoh: pakguru@lopyta.com" value="pakguru@lopyta.com">
          </div>
          <button id="mockLoginBtn" class="btn btn-secondary" style="width: 100%;">Masuk Instan (Mock)</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('mockLoginBtn').addEventListener('click', async () => {
      const email = document.getElementById('mockEmail').value.trim();
      if (!email) {
        alert('Masukkan email mock!');
        return;
      }

      try {
        const response = await fetch('/api/auth/google/mock', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (data.success) {
          window.location.href = '/host';
        } else {
          alert('Mock login gagal: ' + data.error);
        }
      } catch (err) {
        alert('Terjadi kesalahan koneksi: ' + err.message);
      }
    });
  </script>
</body>
</html>
